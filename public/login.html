<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>התחברות - City Social</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center-page">
  <div class="auth-container">
    <h2>התחברות למערכת</h2>

    <form id="loginForm">
      <input type="text" id="username" placeholder="שם משתמש" required>
      <input type="password" id="password" placeholder="סיסמה" required>
      <button type="submit">התחבר</button>
    </form>

    <p id="message"></p>

    <div class="login-info">
      <hr>
      <p><strong>פרטי התחברות לבדיקה:</strong></p>
      <p>
        <u>אדמין</u><br>
        שם משתמש: <b>admin</b><br>
        סיסמה: <b>admin123</b>
      </p>
      <p>
        <u>משתמש רגיל</u><br>
        שם משתמש: <b>user</b><br>
        סיסמה: <b>user1</b>
      </p>
    </div>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
